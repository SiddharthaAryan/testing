name: Validate production build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: Build application
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: build-placeholder
          VITE_FIREBASE_AUTH_DOMAIN: build-placeholder.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: build-placeholder
          VITE_FIREBASE_STORAGE_BUCKET: build-placeholder.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
          VITE_FIREBASE_APP_ID: '1:000000000000:web:buildplaceholder'
